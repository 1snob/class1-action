name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code from private repository
        uses: actions/checkout@v4
        with:
          repository: 1snob/abc7d
          token: ${{ secrets.CLASS1_PAT }}
          path: abc7d

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: 1snob
          password: ${{ secrets.CLASS1_PAT }}

      - name: Build and push native AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: ./abc7d
          file: ./abc7d/Dockerfile
          push: true
          tags: ghcr.io/1snob/class1-action:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
